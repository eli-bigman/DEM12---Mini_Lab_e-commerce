name: CI Pipeline

on:
  push:
    branches: [main, master]
    paths:
      - "airflow/**"
      - "collector/**"
      - "postgres/**"
      - "tests/**"
      - "docker-compose.yml"
      - ".env.example"
      - "requirements-dev.txt"
  pull_request:
    branches: [main, master]
    paths:
      - "airflow/**"
      - "collector/**"
      - "postgres/**"
      - "tests/**"
      - "docker-compose.yml"
      - ".env.example"
      - "requirements-dev.txt"

jobs:
  # ------------------------------------------------------------
  # Job 1: Unit tests
  # ------------------------------------------------------------
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install test dependencies
        run: pip install -r requirements-dev.txt

      - name: Run pytest (validators and cleaners)
        run: pytest tests/test_validators.py tests/test_cleaners.py -v --tb=short

  # ------------------------------------------------------------
  # Job 2: Docker image build validation
  # ------------------------------------------------------------
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create .env from example
        run: cp .env.example .env

      - name: Build all Docker images
        run: docker compose build

  # ------------------------------------------------------------
  # Job 3: Stack validation (end-to-end smoke test)
  # ------------------------------------------------------------
  validate:
    name: Validate Stack
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create .env from example
        run: cp .env.example .env

      - name: Start the full stack
        run: docker compose up -d --build

      - name: Wait for Airflow webserver to be healthy
        run: |
          echo "Polling Airflow health endpoint..."
          for i in $(seq 1 40); do
            STATUS=$(curl -sf http://localhost:8080/health 2>/dev/null \
              | python3 -c "import sys,json; d=json.load(sys.stdin); \
                print(d.get('metadatabase',{}).get('status','unhealthy'))" 2>/dev/null \
              || echo "unhealthy")
            echo "Airflow status: $STATUS (attempt $i/40)"
            if [ "$STATUS" = "healthy" ]; then
              echo "Airflow is ready."
              break
            fi
            sleep 10
          done

      - name: Verify database connection and analytics tables
        run: |
          docker exec ecommerce_postgres pg_isready -U ecommerce_user -d ecommerce
          docker exec ecommerce_postgres psql -U ecommerce_user -d ecommerce \
            -c "SELECT COUNT(*) AS dim_date_rows FROM analytics.dim_date;"

      - name: Wait for Collector to successfully upload data to MinIO
        run: |
          echo "Watching Collector logs for successful uploads..."
          for i in $(seq 1 20); do
            # Check collector logs for successful upload messages
            UPLOAD_COUNT=$(docker logs ecommerce_collector 2>&1 | grep -ci "upload" || true)
            echo "Collector upload log lines: $UPLOAD_COUNT (attempt $i/20)"
            if [ "$UPLOAD_COUNT" -gt "0" ]; then
              echo "Collector has uploaded data to MinIO."
              docker logs ecommerce_collector 2>&1 | tail -5
              break
            fi
            sleep 15
          done

          # Hard fail if collector never uploaded anything
          FINAL_COUNT=$(docker logs ecommerce_collector 2>&1 | grep -ci "upload" || true)
          if [ "$FINAL_COUNT" -eq "0" ]; then
            echo "ERROR: Collector never uploaded data. Container logs:"
            docker logs ecommerce_collector 2>&1
            exit 1
          fi

      - name: Trigger the ecommerce pipeline DAG
        run: |
          docker exec ecommerce_airflow_webserver \
            airflow dags unpause ecommerce_pipeline
          docker exec ecommerce_airflow_webserver \
            airflow dags trigger ecommerce_pipeline

      - name: Poll for DAG run completion
        run: |
          echo "Polling DAG run status..."
          FINAL_STATUS="unknown"
          for i in $(seq 1 30); do
            sleep 15
            FINAL_STATUS=$(docker exec ecommerce_airflow_webserver \
              airflow dags list-runs -d ecommerce_pipeline \
              --no-backfill -o json 2>/dev/null \
              | python3 -c "import sys,json; runs=json.load(sys.stdin); \
                print(runs[0]['state'] if runs else 'unknown')" \
              || echo "unknown")
            echo "DAG run status: $FINAL_STATUS (attempt $i/30)"
            if [ "$FINAL_STATUS" = "success" ] || [ "$FINAL_STATUS" = "failed" ]; then
              break
            fi
          done

          if [ "$FINAL_STATUS" = "failed" ]; then
            echo "FAIL: DAG run failed. Last task states:"
            docker logs ecommerce_airflow_scheduler 2>&1 | tail -30
            exit 1
          fi

      - name: Confirm fact_orders has rows
        run: |
          ROW_COUNT=$(docker exec ecommerce_postgres psql \
            -U ecommerce_user -d ecommerce -t \
            -c "SELECT COUNT(*) FROM analytics.fact_orders;" | tr -d ' \n')
          echo "fact_orders rows: $ROW_COUNT"
          if [ "$ROW_COUNT" -eq "0" ]; then
            echo "FAIL: fact_orders is empty. Diagnostic staging counts:"
            docker exec ecommerce_postgres psql -U ecommerce_user -d ecommerce \
              -c "SELECT 'staging.orders'   AS t, COUNT(*) FROM staging.orders
                  UNION ALL SELECT 'staging.customers', COUNT(*) FROM staging.customers
                  UNION ALL SELECT 'processed_files',   COUNT(*) FROM staging.processed_files;"
            echo "Last 20 Collector log lines:"
            docker logs ecommerce_collector 2>&1 | tail -20
            echo "Last 20 Airflow scheduler log lines:"
            docker logs ecommerce_airflow_scheduler 2>&1 | tail -20
            exit 1
          fi
          echo "PASS: fact_orders has $ROW_COUNT rows."

      - name: Tear down stack
        if: always()
        run: docker compose down -v
