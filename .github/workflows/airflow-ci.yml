name: Airflow CI

on:
  push:
    branches: [main, master]
    paths:
      - "airflow/**"
      - "docker-compose.yml"
      - ".env.example"
      - "tests/**"
      - "requirements-dev.txt"
      - "airflow/requirements.txt"
      - ".github/workflows/airflow-ci.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "airflow/**"
      - "docker-compose.yml"
      - ".env.example"
      - "tests/**"
      - "requirements-dev.txt"
      - "airflow/requirements.txt"
      - ".github/workflows/airflow-ci.yml"

permissions:
  contents: read

jobs:
  check-dag-integrity:
    name: Check DAG Integrity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r airflow/requirements.txt -r requirements-dev.txt

      - name: Run DAG integrity tests
        run: pytest tests/test_dag_integrity.py -v --tb=short

      - name: Build Airflow image
        run: docker build -t ecommerce-airflow:ci ./airflow
